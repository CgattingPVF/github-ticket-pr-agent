name: Build Windows release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to build when running manually
        required: false
        default: main

permissions:
  contents: write

env:
  BUILD_REF: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.ref }}

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out release source
        uses: actions/checkout@v4
        with:
          ref: ${{ env.BUILD_REF }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Run tests
        run: python -m pytest -q

      - name: Build executable
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean --onefile --console `
            --name ticket-pr-agent `
            --add-data "static;static" `
            app.py

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ticket-pr-agent-windows
          path: dist/ticket-pr-agent.exe
          if-no-files-found: error
          retention-days: 14

      - name: Attach executable to published release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: dist/ticket-pr-agent.exe
          fail_on_unmatched_files: true
